{{- if .Values.ingressRoute.enabled }}
{{- $baseDomain := ((.Values.global).baseDomain) | default .Values.ingressRoute.baseDomain | default "" }}
{{- $host := .Values.ingressRoute.host }}
{{- if and (not $host) .Values.ingressRoute.subdomain $baseDomain }}
{{- $host = printf "%s.%s" .Values.ingressRoute.subdomain $baseDomain }}
{{- end }}
{{- if $host }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "dicebear-shim.fullname" . }}
  labels:
    {{- include "dicebear-shim.labels" . | nindent 4 }}
spec:
  {{- with .Values.ingressRoute.entryPoints }}
  entryPoints:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  routes:
    - match: Host(`{{ $host }}`)
      kind: Rule
      services:
        - name: {{ include "dicebear-shim.fullname" . }}-shim
          port: {{ .Values.service.port }}
      {{- with .Values.ingressRoute.middlewares }}
      middlewares:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- with .Values.ingressRoute.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
