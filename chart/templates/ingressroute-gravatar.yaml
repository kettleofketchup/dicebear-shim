{{- if .Values.gravatar.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "dicebear-shim.fullname" . }}-gravatar
  labels:
    {{- include "dicebear-shim.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
    - web
  routes:
    {{- range .Values.gravatar.hosts }}
    - match: Host(`{{ . }}`) && PathPrefix(`/avatar/`)
      kind: Rule
      services:
        - name: {{ include "dicebear-shim.fullname" $ }}-shim
          port: {{ $.Values.service.port }}
    {{- end }}
  {{- if and .Values.gravatar.certificate.enabled .Values.gravatar.certificate.secretName }}
  tls:
    secretName: {{ .Values.gravatar.certificate.secretName }}
  {{- else }}
  tls: {}
  {{- end }}
{{- end }}
