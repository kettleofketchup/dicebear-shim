name: CI

on:
  pull_request:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/dicebear-shim/go.mod

      - name: Test
        run: just cicd::test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/dicebear-shim/go.mod

      - name: Build
        run: just cicd::build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dicebear-shim
          path: bin/

  docker:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG="ghcr.io/kettleofketchup/dicebear-shim:${GITHUB_REF_NAME}"
          LATEST="ghcr.io/kettleofketchup/dicebear-shim:latest"
          just cicd::docker $TAG
          docker tag $TAG $LATEST
          docker push $TAG
          docker push $LATEST

  helm:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" chart/Chart.yaml
          helm package chart/
          helm push dicebear-shim-${VERSION}.tgz oci://ghcr.io/kettleofketchup

  release:
    runs-on: ubuntu-latest
    needs: [docker, helm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Package Helm chart for release
        run: helm package chart/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dicebear-shim-*.tgz
